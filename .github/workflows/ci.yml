name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
jobs:
  compile-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx hardhat compile
      - run: npx hardhat test
